name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18
      - name: Install dependencies
        run: npm ci
      - name: Build
        run: npm run build
      - name: Run tests
        run: npm test -- --passWithNoTests
name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
      - name: Install dependencies
        run: npm ci
      - name: Build
        run: npm run build

  test-create-profile:
    needs: build
    runs-on: ubuntu-latest
    if: ${{ secrets.INTERNAL_API_KEY && secrets.DEPLOY_URL }}
    steps:
      - name: Test create-profile endpoint
        env:
          INTERNAL_API_KEY: ${{ secrets.INTERNAL_API_KEY }}
          DEPLOY_URL: ${{ secrets.DEPLOY_URL }}
        run: |
          echo "Testing create-profile endpoint..."
          node scripts/test-create-profile.js
